name: Publish Helm chart

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Set Version"]
    types: [completed]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Check for changes in charts or deploy folders
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -qE '^charts/|^deploy/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect version
        if: steps.check_changes.outputs.changed == 'true'
        id: set-env
        run: |
          VERSION=$(git describe --tags --exact-match 2>/dev/null)
          if [ -z "$VERSION" ]; then
            echo "Error: current commit is not tagged" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Version Helm Chart
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          export CHART_VERSION=${{ steps.set-env.outputs.version }}
          if [[ $CHART_VERSION == v* ]]; then
            export CHART_VERSION=${CHART_VERSION:1}
          fi
          find ./charts -name Chart.yaml -maxdepth 2 -exec sed -i "s/version: .*/version: ${CHART_VERSION}/g" {} \;
          find ./charts -name Chart.yaml -maxdepth 2 -exec sed -i "s/appVersion: .*/appVersion: ${{ steps.set-env.outputs.version }}/g" {} \;

      - name: Set up Helm
        if: steps.check_changes.outputs.changed == 'true'
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          for dir in $(find ./charts -name Chart.yaml -maxdepth 2 -exec dirname {} \;); do
            helm lint "$dir"
          done

      - name: Login to Helm Registry
        if: steps.check_changes.outputs.changed == 'true'
        run: echo "${{ secrets.HELM_PASSWORD }}" | helm registry login ${{ secrets.HELM_REGISTRY }} --username ${{ secrets.HELM_USERNAME }} --password-stdin

      - name: Package and publish Helm chart
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          for dir in $(find ./charts -name Chart.yaml -maxdepth 2 -exec dirname {} \;); do
            (cd $dir && helm package . && helm push *.tgz oci://${{ secrets.HELM_REGISTRY }}/${{ github.repository }}/charts)
          done
